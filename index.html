<html>

    <div class="about-row">
        <img src="unnamed.png" class="profile-img">

    </div>

    <h2>Contacts:</h2>

            <p>aarav0051@gmail.com</p>

    <div id="reviews">
        <p>Loading reviews...</p>
    </div>
    
    <h2>Leave a Review:</h2>

    <form id="review-form">
        <input
            id="reviewer-name"
            type="text"

            id="comment"
            placeholder="Write your review"
            required

    </form>

        <p id="review-message"></p>
